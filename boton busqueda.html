<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD Terminal - Expediente Rayos X</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #030812 url('https://transparenttextures.com');
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* Contenedor principal con bisel y bordes Sci-Fi */
        .hud-panel {
            background: linear-gradient(185deg, rgba(16, 29, 48, 0.9) 0%, rgba(8, 15, 26, 0.95) 100%);
            border: 2px solid #1a365d;
            border-radius: 12px;
            width: 560px;
            padding: 24px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 140, 255, 0.15);
        }

        /* Adornos angulares en las esquinas simulando metal */
        .hud-panel::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 12px;
            pointer-events: none;
            border: 1px solid rgba(0, 212, 255, 0.3);
            clip-path: polygon(0 0, 92% 0, 100% 15%, 100% 100%, 8% 100%, 0 85%);
        }

        /* Encabezado */
        .hud-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            background: rgba(4, 10, 20, 0.6);
            padding: 10px;
            border-radius: 6px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hud-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #5ce1e6;
            text-shadow: 0 0 10px rgba(92, 225, 230, 0.4);
        }

        /* Indicador de Sección */
        .hud-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: #4a75a0;
            text-transform: uppercase;
            margin-bottom: 6px;
            padding: 0 4px;
        }

        .hud-tag {
            color: #00d4ff;
            font-weight: bold;
        }
        .hud-tag::before {
            content: '■ ';
            color: #00d4ff;
            animation: blink 1.5s infinite;
        }

        /* Caja de entrada con textura de malla militar */
        .hud-input-container {
            background: rgba(3, 8, 16, 0.9);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 6px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .hud-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #5ce1e6;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(92, 225, 230, 0.5);
        }

        /* Información secundaria del sistema */
        .hud-subdata {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #4a75a0;
            margin-bottom: 24px;
            padding: 0 6px;
        }

        /* Botón de Radar (Forma ovalada de la imagen) */
        .btn-radar {
            width: 100%;
            background: linear-gradient(180deg, #1f4cb8 0%, #0d276b 100%);
            border: 2px solid #3873ff;
            border-radius: 40px;
            padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(31, 76, 184, 0.5), inset 0 0 10px rgba(255,255,255,0.2);
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }

        .btn-radar:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(56, 115, 255, 0.8);
            letter-spacing: 3px;
        }

        /* Botón Cerrar Trapezoidal */
        .btn-close-container {
            display: flex;
            justify-content: center;
        }

        .btn-close {
            background: linear-gradient(180deg, #112244 0%, #081022 100%);
            border: 1px solid #1f4cb8;
            color: #64b5f6;
            padding: 8px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 2px;
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: #1f4cb8;
            color: #fff;
            box-shadow: 0 0 15px rgba(31, 76, 184, 0.6);
        }

        @keyframes blink {
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="hud-panel">
        <!-- Encabezado -->
        <div class="hud-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5ce1e6" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <h1>Expediente &ndash; Rayos X</h1>
        </div>

        <!-- Metadatos superiores -->
        <div class="hud-meta">
            <span class="hud-tag">Unidad de Análisis de Datos</span>
            <span>SYS_OK_2026</span>
        </div>

        <!-- Caja de Código Principal -->
        <div class="hud-input-container">
            <span class="hud-value">A20269420</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1f4cb8" stroke-width="3" style="cursor:pointer;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>

        <!-- Datos menores del HUD de la imagen -->
        <div class="hud-subdata">
            <span>ESTADO: ACTIVO</span>
            <span>REGISTRO ID: 74B-4</span>
        </div>

        <!-- Botón Óvalo de Radar -->
        <button class="btn-radar">Radar Universal</button>

        <!-- Botón Trapezoidal de Cierre -->
        <div class="btn-close-container">
            <button class="btn-close">X Cerrar</button>
        </div>
    </div>

</body>
</html>
