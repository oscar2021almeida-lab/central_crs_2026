<!-- 📡 RADAR DE CONEXIÓN FIREBASE - INYECCIÓN QUIRÚRGICA -->
<script type="module">
    import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
    
    window.__fbReady.then((fb) => {
        const q = query(collection(fb.db, "trips"), where("status", "==", "Pending"));
        
        onSnapshot(q, (snapshot) => {
            const contenedor = document.getElementById("kb-content-1");
            if (!contenedor) return;
            
            contenedor.innerHTML = ""; 
            
            if (snapshot.empty) {
                contenedor.innerHTML = '<div style="text-align:center; padding: 20px; color: #64748B; font-family: monospace; font-size: 10px;">-- SIN OPERACIONES PENDIENTES --</div>';
                return;
            }

            snapshot.forEach((doc) => {
                const viaje = doc.data();
                const card = document.createElement("div");
                card.className = "mini-card mc-alerta"; 
                
                const idCorto = doc.id.substring(0, 6).toUpperCase();
                const precio = viaje.tarifa ? viaje.tarifa.toLocaleString('es-CL') : "0";
                
                card.innerHTML = `
                    <div class="mc-top">
                        <span>ID: ${idCorto}</span>
                        <span class="mc-date">${viaje.fecha || 'INMEDIATO'}</span>
                    </div>
                    <div class="mc-dest" style="color: white; font-size: 11px;">
                        📍 ${viaje.origen} <br><span style="color:#38bdf8;">⬇</span><br> 🏁 ${viaje.destino}
                    </div>
                    <div style="font-size:9px; color:#cbd5e1; margin: 8px 0;">👤 ${viaje.nombre} | 📞 ${viaje.telefono}</div>
                    <div class="mc-bot">
                        <span class="mc-tag">${viaje.pago || 'EFECTIVO'}</span>
                        <span class="mc-price">$${precio}</span>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        });
    });
</script>
